<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denti-Cal ARC Code Reference</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');

  :root {
    --bg:        #f0f2f5;
    --white:     #ffffff;
    --navy:      #1b3a5c;
    --navy-mid:  #254d7a;
    --navy-soft: #e8eef5;
    --border:    #d0d5dd;
    --text:      #1a1a2e;
    --muted:     #6b7280;
    --accent:    #1b3a5c;

    --cat-diag:    #4e9af1;
    --cat-surgery: #e85d3a;
    --cat-drugs:   #9b59b6;
    --cat-perio:   #2ecc71;
    --cat-endo:    #f39c12;
    --cat-restore: #1abc9c;
    --cat-prosth:  #e91e8c;
    --cat-ortho:   #00bcd4;
    --cat-misc:    #7f8c8d;
    --cat-policy:  #e74c3c;

    --tint-diag:    #eaf3fe;
    --tint-surgery: #fdeee9;
    --tint-drugs:   #f5eefa;
    --tint-perio:   #e8f9ef;
    --tint-endo:    #fef6e6;
    --tint-restore: #e7f8f5;
    --tint-prosth:  #fde8f4;
    --tint-ortho:   #e4f7fb;
    --tint-misc:    #f4f5f6;
    --tint-policy:  #fdeaea;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── Title Banner ── */
  .title-banner {
    background: var(--navy);
    color: #fff;
    text-align: center;
    padding: 18px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.2px;
    border-bottom: 3px solid var(--navy-mid);
  }
  .title-banner span {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 400;
    font-size: 0.78rem;
    opacity: 0.75;
    margin-left: 12px;
  }

  /* ── Sub-header (badge + controls) ── */
  .sub-header {
    max-width: 1200px;
    margin: 20px auto 0;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .total-badge {
    background: var(--white);
    border: 1px solid var(--border);
    border-top: 3px solid var(--navy);
    border-radius: 6px;
    padding: 10px 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .total-badge .num {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--navy);
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1;
  }
  .total-badge .lbl {
    font-size: 0.68rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* ── Controls ── */
  .controls {
    max-width: 1200px;
    margin: 16px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 14px 9px 36px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(27, 58, 92, 0.1);
  }
  .search-wrap .icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.85rem;
    pointer-events: none;
  }

  .filter-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--muted);
    font-size: 0.74rem;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--navy); color: var(--navy); background: var(--navy-soft); }
  .filter-btn.active { color: #fff; border-color: transparent; font-weight: 600; }

  .filter-btn[data-cat="All"].active                    { background: var(--navy); }
  .filter-btn[data-cat="Diagnostic/Preventive"].active  { background: var(--cat-diag); }
  .filter-btn[data-cat="Oral Surgery"].active           { background: var(--cat-surgery); }
  .filter-btn[data-cat="Drugs/Anesthesia"].active       { background: var(--cat-drugs); }
  .filter-btn[data-cat="Periodontics"].active           { background: var(--cat-perio); }
  .filter-btn[data-cat="Endodontics"].active            { background: var(--cat-endo); }
  .filter-btn[data-cat="Restorative"].active            { background: var(--cat-restore); }
  .filter-btn[data-cat="Prosthodontics"].active         { background: var(--cat-prosth); }
  .filter-btn[data-cat="Orthodontic Services"].active   { background: var(--cat-ortho); }
  .filter-btn[data-cat="Miscellaneous"].active          { background: var(--cat-misc); }
  .filter-btn[data-cat="Payment Policy"].active         { background: var(--cat-policy); }

  /* ── Results count ── */
  .results-count {
    max-width: 1200px;
    margin: 10px auto 8px;
    padding: 0 20px;
    font-size: 0.74rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── Table ── */
  .table-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  thead tr {
    background: var(--navy);
  }

  thead th {
    padding: 11px 16px;
    text-align: left;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    border-bottom: 2px solid var(--navy-mid);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: filter 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { filter: brightness(0.96); }

  tbody td {
    padding: 10px 16px;
    vertical-align: top;
    font-size: 0.84rem;
    line-height: 1.5;
  }

  /* Category row tints */
  tr.tint-diag    { background: var(--tint-diag); }
  tr.tint-surgery { background: var(--tint-surgery); }
  tr.tint-drugs   { background: var(--tint-drugs); }
  tr.tint-perio   { background: var(--tint-perio); }
  tr.tint-endo    { background: var(--tint-endo); }
  tr.tint-restore { background: var(--tint-restore); }
  tr.tint-prosth  { background: var(--tint-prosth); }
  tr.tint-ortho   { background: var(--tint-ortho); }
  tr.tint-misc    { background: var(--tint-misc); }
  tr.tint-policy  { background: var(--tint-policy); }

  .col-code {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 0.88rem;
    white-space: nowrap;
    color: var(--navy);
  }

  .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 7px;
    flex-shrink: 0;
    vertical-align: middle;
  }

  .col-cat {
    font-size: 0.78rem;
    white-space: nowrap;
    color: var(--muted);
    font-weight: 500;
  }

  .col-cat span { vertical-align: middle; }

  .col-desc { color: var(--text); }

  .highlight {
    background: rgba(27, 58, 92, 0.15);
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 600;
  }

  .no-results {
    text-align: center;
    padding: 48px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
  }

  /* Category color dots */
  .c-diag    { background: var(--cat-diag); }
  .c-surgery { background: var(--cat-surgery); }
  .c-drugs   { background: var(--cat-drugs); }
  .c-perio   { background: var(--cat-perio); }
  .c-endo    { background: var(--cat-endo); }
  .c-restore { background: var(--cat-restore); }
  .c-prosth  { background: var(--cat-prosth); }
  .c-ortho   { background: var(--cat-ortho); }
  .c-misc    { background: var(--cat-misc); }
  .c-policy  { background: var(--cat-policy); }

  /* Star badge for codes found in denial export */
  tr.in-data .col-code::after {
    content: '★';
    color: var(--cat-surgery);
    font-size: 0.7rem;
    margin-left: 5px;
    vertical-align: top;
  }

  .legend {
    max-width: 1200px;
    margin: 12px auto 0;
    padding: 0 20px;
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }
  .legend span { color: var(--cat-surgery); }
</style>
</head>

// Codes found in the denial export
const IN_DATA = new Set(['326','002','275','004','086B','096','020H','290','289','299','299A','313A','267','069','004A','020C','020D']);

const catClass = {
  'Diagnostic/Preventive': 'c-diag',
  'Oral Surgery':          'c-surgery',
  'Drugs/Anesthesia':      'c-drugs',
  'Periodontics':          'c-perio',
  'Endodontics':           'c-endo',
  'Restorative':           'c-restore',
  'Prosthodontics':        'c-prosth',
  'Orthodontic Services':  'c-ortho',
  'Miscellaneous':         'c-misc',
  'Payment Policy':        'c-policy'
};

const catTint = {
  'Diagnostic/Preventive': 'tint-diag',
  'Oral Surgery':          'tint-surgery',
  'Drugs/Anesthesia':      'tint-drugs',
  'Periodontics':          'tint-perio',
  'Endodontics':           'tint-endo',
  'Restorative':           'tint-restore',
  'Prosthodontics':        'tint-prosth',
  'Orthodontic Services':  'tint-ortho',
  'Miscellaneous':         'tint-misc',
  'Payment Policy':        'tint-policy'
};

let currentCat = 'All';
let currentSearch = '';

function highlight(text, term) {
  if (!term) return text;
  const re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return text.replace(re, '<span class="highlight">$1</span>');
}

function render() {
  const tbody = document.getElementById('tableBody');
  const term = currentSearch.toLowerCase();

  const filtered = ARC_DATA.filter(row => {
    const catMatch = currentCat === 'All' || row.Category === currentCat;
    const searchMatch = !term ||
      row.Code.toLowerCase().includes(term) ||
      row.Description.toLowerCase().includes(term) ||
      row.Category.toLowerCase().includes(term);
    return catMatch && searchMatch;
  });

  document.getElementById('resultsCount').textContent =
    `Showing ${filtered.length} of 203 codes`;
  document.getElementById('total-count').textContent = filtered.length;

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" class="no-results">No codes match your search.</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(row => {
    const inData = IN_DATA.has(row.Code);
    const tint = catTint[row.Category] || '';
    const classes = [tint, inData ? 'in-data' : ''].filter(Boolean).join(' ');
    const dot = `<span class="dot ${catClass[row.Category] || ''}"></span>`;
    const codeHl = highlight(row.Code, currentSearch);
    const descHl = highlight(row.Description, currentSearch);
    const catHl  = highlight(row.Category, currentSearch);
    return `<tr${classes ? ` class="${classes}"` : ''}>
      <td class="col-code">${codeHl}</td>
      <td class="col-cat">${dot}<span>${catHl}</span></td>
      <td class="col-desc">${descHl}</td>
    </tr>`;
  }).join('');
}

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  render();
});

// Filter buttons
document.getElementById('filterBtns').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
});

render();
</script>
